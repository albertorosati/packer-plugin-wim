name: build

permissions:
  contents: write
  packages: read

on:
  push:
    branches:
    - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version for artifact naming (e.g. v1.0.0)'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      version:
        description: 'Override version for artifact naming (e.g. v1.0.0)'
        required: false
        type: string
        default: ''

jobs:
  build_windows:
    strategy:
      matrix:
        arch: ["amd64"]
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: "./.github/actions/build-windows"
      with:
        GOARCH: ${{ matrix.arch }}
        VERSION: ${{ inputs.version }}
