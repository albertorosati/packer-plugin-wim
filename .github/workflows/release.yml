name: release

permissions:
  contents: write
  packages: read

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    uses: "./.github/workflows/build.yml"

  release:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts
          
      - name: List artifacts
        shell: bash
        run: ls -la artifacts

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          find artifacts -name '*.zip' | sort | while read f; do
            sha256sum "$f" | awk -v fname="$(basename $f)" '{print $1 "  " fname}'
          done > "packer-plugin-wim_${VERSION}_SHA256SUMS"

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*/*
            packer-plugin-wim_${{ github.ref_name }}_SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}